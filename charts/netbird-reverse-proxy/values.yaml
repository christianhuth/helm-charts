# -- Provide a name in place of `netbird-reverse-proxy`
nameOverride: ""

# -- String to fully override `"netbird-reverse-proxy.fullname"`
fullnameOverride: ""

image:
  # -- image registry
  registry: docker.io
  # -- image repository
  repository: netbirdio/reverse-proxy
  # -- image pull policy
  pullPolicy: Always
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- If defined, uses a Secret to pull an image from a private Docker registry or repository.
imagePullSecrets: []

# -- Number of replicas.
# Note: When using ACME certificates (proxy.acmeCertificates=true), running more than one
# replica is not recommended as certificate state is not shared between pods.
replicaCount: 1

# -- The number of old ReplicaSets to retain
revisionHistoryLimit: 10

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Annotations to be added to the pods
podAnnotations: {}

# -- pod-level security context
podSecurityContext: {}
  # fsGroup: 2000

# -- container-level security context.
# Note: The proxy needs to bind to ports 80 and 443 which may require elevated privileges
# depending on your cluster configuration.
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  # -- Kubernetes service type
  type: ClusterIP
  # -- Additional annotations for the Service resource
  annotations: {}
  http:
    # -- Kubernetes service port for HTTP traffic
    port: 80
  https:
    # -- Kubernetes service port for HTTPS traffic
    port: 443

ingress:
  # -- Enable ingress record generation.
  # Note: This is typically not needed as the reverse proxy handles TLS termination itself.
  enabled: false
  # -- IngressClass that will be be used to implement the Ingress
  className: ""
  # -- Additional annotations for the Ingress resource
  annotations: {}
    # cert-manager.io/cluster-issuer: cluster-issuer-name
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # -- An array with hosts and paths
  # @default -- see [values.yaml](./values.yaml)
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  # -- An array with the tls configuration
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# BETA: Configure the gateway routes for the chart here.
# More routes can be added by adding a dictionary key like the 'main' route.
# Being BETA this can/will change in the future without notice, do not use unless you want to take that risk
# [[ref]](https://gateway-api.sigs.k8s.io/references/spec/#gateway.networking.k8s.io%2fv1alpha2)
route:
  main:
    # -- Enables or disables the route
    enabled: false

    # -- Set the route apiVersion, e.g. gateway.networking.k8s.io/v1 or gateway.networking.k8s.io/v1alpha2
    apiVersion: gateway.networking.k8s.io/v1

    # -- Set the route kind
    # Valid options are GRPCRoute, HTTPRoute, TCPRoute, TLSRoute, UDPRoute
    kind: HTTPRoute

    # -- Add annotations to the route
    annotations: {}

    # -- Add labels to the route
    labels: {}

    # -- Hostnames to be matched
    hostnames: []
    # - my-filter.example.com

    # -- Parent references (Gateway)
    parentRefs: []
    # - name: acme-gw

    # -- define conditions used for matching the rule against incoming HTTP requests.
    # @default -- see [values.yaml](./values.yaml)
    matches:
      - path:
          type: PathPrefix
          value: /

    # -- Filters define the filters that are applied to requests that match this rule.
    filters: []

    # -- Additional custom rules that can be added to the route
    additionalRules: []

    # -- adds a filter for redirecting to https (HTTP 301 Moved Permanently). To redirect HTTP traffic to HTTPS, you need to have a Gateway with both HTTP and HTTPS listeners. Matches and filters do not take effect if enabled. Ref. https://gateway-api.sigs.k8s.io/guides/http-redirect-rewrite/
    httpsRedirect: false

    # -- defines the timeouts that can be configured for an HTTP request
    timeouts: {}

autoscaling:
  # -- Enable Horizontal POD autoscaling.
  # Note: Not recommended when using ACME certificates as certificate state is not shared.
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 100
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target Memory utilization percentage
  # targetMemoryUtilizationPercentage: 80

# -- Resource limits and requests for the controller pods.
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- Node labels for pod assignment
nodeSelector: {}

# -- Toleration labels for pod assignment
tolerations: []

# -- Affinity settings for pod assignment
affinity: {}

# -- additional environment variables to be added to the pods
extraEnv: []
  # - name: FOO
  #   value: BAR

# -- additional environment variables from ConfigMaps or Secrets
extraEnvFrom: []
  # - configMapRef:
  #     name: my-configmap
  # - secretRef:
  #     name: my-secret

proxy:
  # -- Address the HTTPS proxy listener binds to (NB_PROXY_ADDRESS)
  address: ":80"
  # -- Enable ACME (Let's Encrypt) certificate management (NB_PROXY_ACME_CERTIFICATES).
  # When enabled, certificates are stored in the directory specified by proxy.certificateDirectory.
  # Consider enabling persistence.enabled=true to avoid certificate loss on pod restarts.
  acmeCertificates: false
  # -- Allow insecure (non-TLS) connections to upstream services (NB_PROXY_ALLOW_INSECURE)
  allowInsecure: true
  auth:
    # -- Name of an existing secret containing the proxy token.
    # If set, proxy.auth.token will be ignored.
    # The secret must contain a key named `token`.
    existingSecret: ""
    # -- Proxy authentication token (NB_PROXY_TOKEN).
    # It is strongly recommended to use proxy.auth.existingSecret instead of providing the token here.
    token: ""
  # -- Directory where TLS certificates are stored (NB_PROXY_CERTIFICATE_DIRECTORY)
  certificateDirectory: "/certs"
  # -- Domain name the proxy serves (NB_PROXY_DOMAIN)
  domain: ""
  # -- Log level for the proxy (NB_PROXY_LOG_LEVEL)
  logLevel: "info"
  # -- Address of the NetBird management server (NB_PROXY_MANAGEMENT_ADDRESS)
  managementAddress: ""
  # -- Whether this is a private proxy (NB_PROXY_PRIVATE)
  private: true

persistence:
  # -- Enable persistent storage for TLS certificates.
  # Recommended when proxy.acmeCertificates=true to avoid re-requesting certificates on pod restarts.
  enabled: false
  # -- Provide an existing PersistentVolumeClaim. If set, no new PVC will be created.
  existingClaim: ""
  # -- Name of the StorageClass required by the claim
  storageClassName: ""
  # -- The desired access modes the volume should have
  accessModes:
    - ReadWriteOnce
  # -- Annotations to be added to the PersistentVolumeClaim
  annotations: {}
  # -- Represents the minimum and maximum resources the volume should have
  resources:
    requests:
      storage: 1Gi
