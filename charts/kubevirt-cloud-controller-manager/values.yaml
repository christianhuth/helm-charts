# -- Provide a name in place of `kubevirt-cloud-controller-manager`
nameOverride: ""

# -- String to fully override `"kubevirt-cloud-controller-manager.fullname"`
fullnameOverride: ""

image:
  # -- image registory
  registry: quay.io
  # -- image repository
  repository: kubevirt/kubevirt-cloud-controller-manager
  # -- image pull policy
  pullPolicy: Always
  # -- Overrides the image tag
  tag: "v0.6.0"

# -- If defined, uses a Secret to pull an image from a private Docker registry or repository.
imagePullSecrets: []

# -- Number of replicas
replicaCount: 1

# -- The number of old ReplicaSets to retain
revisionHistoryLimit: 0

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Annotations to be added to exporter pods
podAnnotations: {}

# -- pod-level security context
podSecurityContext: {}
  # fsGroup: 2000

# -- container-level security context
securityContext:
  privileged: true

# -- Resource limits and requests for the pods.
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  # -- Enable Horizontal POD autoscaling
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 100
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target Memory utilization percentage
  # targetMemoryUtilizationPercentage: 80

# -- Node labels for pod assignment
nodeSelector:
  node-role.kubernetes.io/control-plane: ""

# -- Toleration labels for pod assignment
tolerations:
  - key: node.cloudprovider.kubernetes.io/uninitialized
    value: "true"
    effect: NoSchedule
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

# -- Affinity settings for pod assignment
affinity: {}

# -- additional environment variables to be added to the pods
extraEnv: []
  # - name: FOO
  #   value: BAR

kccm:
  additionalLabels:
    # -- Adds additional capi labels to the cloud controller manager resources
    enabled: true
  cluster:
    kubeconfig:
      # -- The name of the secret containing the kubeconfig to access the cluster API server. If not set, will default to "<cluster-name>-kubeconfig"
      secretName: ""
    # -- The name of the cluster to which the cloud controller manager belongs. This is used by the cloud controller manager to watch for changes to the cluster object and update its status accordingly.
    name: ""
    # -- The namespace in which the cloud controller manager should watch for changes to the cluster object. If not set, the cloud controller manager will watch for changes to the cluster object in the Release namespace.
    namespace: ""
  cloudConfig:
    instancesV2:
      # -- Whether to use the instancesV2 API for listing and watching instances. This is required for OpenShift 4.13 and later.
      enabled: true
      # -- Whether to use the zone and region information from the instance metadata. This is required for OpenShift 4.13 and later.
      zoneAndRegionEnabled: false
    loadBalancer:
      # -- The interval at which the cloud controller manager polls for the creation of load balancers
      creationPollInterval: 5
      # -- The timeout for polling for the creation of load balancers
      creationPollTimeout: 60
  # -- Indicates whether the cloud controller manager is installed outside of the managed cluster (isolated) or inside
  deploymentMode: "isolated"
