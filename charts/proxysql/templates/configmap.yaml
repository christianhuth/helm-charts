{{- if and (not .Values.proxysql.configmap) (not .Values.proxysql.secret.enabled) (not .Values.proxysql.secret.existingSecret) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "proxysql.fullname" . }}
data:
  proxysql.cnf: |
    {{- include "proxysql.config" . | nindent 4 }}
{{- end }}
